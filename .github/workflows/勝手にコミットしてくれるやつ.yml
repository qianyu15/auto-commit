name: pseudo every second commit

on:
  workflow_dispatch:

jobs:
  commit-loop:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Loop commits every second (10 times demo)
        run: |
          git config user.name "qianyu15"
          git config user.email "qianyuyangvip@gmail.com"

          for i in {1..9996}; do
            echo "tick: $(date -u +%Y-%m-%dT%H:%M:%S)" >> heartbeat.txt

            git add heartbeat.txt
            git commit -m "tick $i $(date -u +%H:%M:%S)" || true
            git push || true

            sleep 1
          done
