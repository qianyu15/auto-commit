name: auto commit every minute

on:
  schedule:
    - cron: "* * * * *"  # 毎分
  workflow_dispatch:

jobs:
  commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Make change
        run: |
          echo "update: $(date -u)" >> heartbeat.txt

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "chore: heartbeat $(date -u)" || echo "no changes"
          git push
