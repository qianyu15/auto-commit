name: hourly-issue-spammer

on:
  schedule:
    - cron: "* * * * *"  # 毎分
  workflow_dispatch:

permissions:
  issues: write

jobs:
  create_issue:
    runs-on: ubuntu-latest

    steps:
      - name: Create Issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TITLE="auto issue $(date -u +'%Y-%m-%d %H:%M:%S')"
          BODY="generated by github actions bot. time: $(date -u)"

          curl -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/issues \
            -d "{
              \"title\": \"$TITLE\",
              \"body\": \"$BODY\"
            }"
